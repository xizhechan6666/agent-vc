services:
  - type: web
    name: agent-vc
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: LLM_API_KEY
        sync: false
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 8787
      - key: LLM_BASE_URL
        value: https://api.deepseek.com/chat/completions
      - key: LLM_MODEL
        value: deepseek-chat
      - key: LLM_SSL_VERIFY
        value: 1
      - key: SERVICE_FEE_USDT
        value: 5
      - key: X402_PAY_TO
        value: 0xc964dcc547cf0ce07716babb4eb2f4a2f09bf16c
      - key: X402_PRICE
        value: $5.00
      - key: X402_NETWORK
        value: eip155:84532
      - key: X402_SCHEME
        value: exact
      - key: X402_MAX_TIMEOUT_SECONDS
        value: 300
      - key: INVESTMENT_WINDOW_SIZE
        value: 20
      - key: INVESTMENT_MAX_PER_WINDOW
        value: 1
      - key: INVESTMENT_MINIMUM_SCORE
        value: 88
      - key: DB_SYNC_WEBHOOK_URL
        sync: false
      - key: DB_SYNC_SECRET
        sync: false
      - key: X402_ENABLED
        value: 1
